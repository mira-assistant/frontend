<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dadei Assistant — Updater</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        background: #09090b;
        color: #fafafa;
        -webkit-app-region: drag;
        user-select: none;
        overflow: hidden;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        padding: 20px 22px 16px;
        gap: 14px;
      }
      .title {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #e4e4e7;
      }
      .msg {
        font-size: 12px;
        line-height: 1.45;
        color: #a1a1aa;
        min-height: 2.9em;
      }
      .bar-outer {
        height: 3px;
        background: #27272a;
        border-radius: 2px;
        overflow: hidden;
      }
      .bar-inner {
        height: 100%;
        width: 0%;
        background: #5865f2;
        border-radius: 2px;
        transition: width 0.12s ease-out;
      }
      .bar-inner.indeterminate {
        width: 35%;
        animation: indet 1.1s ease-in-out infinite;
      }
      @keyframes indet {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(320%);
        }
      }
      .actions {
        display: flex;
        gap: 10px;
        margin-top: auto;
        -webkit-app-region: no-drag;
      }
      button {
        font-size: 11px;
        font-weight: 500;
        padding: 6px 12px;
        border-radius: 4px;
        border: none;
        cursor: pointer;
        font-family: inherit;
      }
      .primary {
        background: #5865f2;
        color: #fff;
      }
      .primary:hover {
        background: #4752c4;
      }
      .secondary {
        background: #27272a;
        color: #e4e4e7;
      }
      .secondary:hover {
        background: #3f3f46;
      }
      .actions.hidden {
        display: none;
      }
      .hint {
        font-size: 10px;
        color: #71717a;
        line-height: 1.4;
        margin-top: 4px;
      }
      .hint.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="title" id="title">Dadei Assistant</div>
      <div class="msg" id="msg">Checking for updates…</div>
      <div class="bar-outer" aria-hidden="true">
        <div class="bar-inner indeterminate" id="bar"></div>
      </div>
      <div class="hint hidden" id="hint"></div>
      <div class="actions hidden" id="actions">
        <button type="button" class="primary" id="btnPrimary">Open releases</button>
        <button type="button" class="secondary" id="btnQuit">Quit</button>
      </div>
    </div>
    <script>
      const titleEl = document.getElementById('title');
      const msgEl = document.getElementById('msg');
      const barEl = document.getElementById('bar');
      const actionsEl = document.getElementById('actions');
      const btnPrimary = document.getElementById('btnPrimary');
      const btnQuit = document.getElementById('btnQuit');
      const hintEl = document.getElementById('hint');

      window.updaterAPI.onState((s) => {
        titleEl.textContent = s.title || 'Dadei Assistant';
        msgEl.textContent = s.message || '';
        if (s.progress != null && s.progress >= 0) {
          barEl.classList.remove('indeterminate');
          barEl.style.width = Math.min(100, Math.max(0, s.progress)) + '%';
        } else {
          barEl.style.width = '0%';
          barEl.classList.add('indeterminate');
        }
        if (s.showActions) {
          actionsEl.classList.remove('hidden');
          btnPrimary.textContent = s.primaryLabel || 'Open releases';
          btnPrimary.style.display = s.hidePrimary ? 'none' : '';
        } else {
          actionsEl.classList.add('hidden');
        }
        if (s.hint) {
          hintEl.textContent = s.hint;
          hintEl.classList.remove('hidden');
        } else {
          hintEl.classList.add('hidden');
        }
      });

      btnPrimary.addEventListener('click', () => window.updaterAPI.openReleases());
      btnQuit.addEventListener('click', () => window.updaterAPI.quitApp());
    </script>
  </body>
</html>
