name: Desktop CD

on:
  push:
    branches: [main]
    paths:
      - 'apps/desktop/**'
      - 'packages/ui/**'
      - 'package-lock.json'
      - 'package.json'

permissions:
  contents: write

concurrency:
  group: desktop-cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Write .env.production (Vite + Electron)
        env:
          API_URL: ${{ secrets.API_URL }}
        shell: bash
        run: |
          if [ -z "$API_URL" ]; then
            echo "Missing API_URL"
            exit 1
          fi
          printf 'API_URL=%s\nBETA=false\n' "$API_URL" > .env.production
          printf 'API_URL=%s\nBETA=false\n' "$API_URL" > apps/desktop/.env.production

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev

      - name: Rebuild native modules (keytar)
        working-directory: apps/desktop
        run: npx --yes @electron/rebuild -f -w keytar

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        working-directory: apps/desktop
        run: npm run package

      # macOS auto-update needs a Developer ID–signed build. Set CSC_LINK + CSC_KEY_PASSWORD
      # (p12). Optional: APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID for notarization
      # (afterSign hook skips notarize when APPLE_ID is unset).
      - name: Package (macOS)
        if: matrix.platform == 'macos'
        working-directory: apps/desktop
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "${CSC_LINK:-}" ]; then
            echo "No CSC_LINK: using ad-hoc signing (Gatekeeper / auto-update may block until Developer ID secrets are set)."
            export CSC_IDENTITY_AUTO='-'
            # electron-builder treats CSC_LINK="" (from empty secrets.*) as a path; path.resolve(cwd, "") is cwd → "not a file".
            unset CSC_LINK
          fi
          npm run package

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        working-directory: apps/desktop
        run: npm run package

      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform }}
          path: apps/desktop/release/

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read version
        id: pkg
        run: |
          VERSION=$(jq -r .version apps/desktop/package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          name: installers-windows
          path: assets/windows

      - uses: actions/download-artifact@v4
        with:
          name: installers-macos
          path: assets/macos

      - uses: actions/download-artifact@v4
        with:
          name: installers-linux
          path: assets/linux

      - name: Drop per-OS debug yml
        run: find assets -name builder-debug.yml -delete

      - uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.pkg.outputs.tag }}
          name: Dadei App ${{ steps.pkg.outputs.tag }}
          commit: ${{ github.sha }}
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          artifacts: assets/windows/*.exe,assets/windows/*.yml,assets/macos/*.dmg,assets/macos/*.zip,assets/macos/*.yml,assets/linux/*.AppImage,assets/linux/*.yml
          token: ${{ secrets.GITHUB_TOKEN }}
